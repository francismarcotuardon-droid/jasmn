<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Jasmin</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #matrix-canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .content-wrapper {
            position: relative; display: flex; justify-content: center;
            align-items: center; height: 100vh; z-index: 10; flex-direction: column;
        }

        /* Text Styles */
        #display-text {
            color: #ff007f; font-size: clamp(3rem, 10vw, 6rem);
            font-weight: bold; text-transform: uppercase;
            text-shadow: 0 0 15px #ff007f; text-align: center;
            z-index: 11;
        }

        #message-popup {
            color: white; background: rgba(255, 0, 127, 0.8);
            padding: 10px 20px; border-radius: 20px;
            margin-bottom: 20px; display: none; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            z-index: 12;
        }

        #start-btn {
            padding: 15px 30px; font-size: 1.5rem; background: transparent;
            color: #ff007f; border: 2px solid #ff007f; cursor: pointer;
            border-radius: 8px; box-shadow: 0 0 10px #ff007f;
        }

        /* Folded Paper */
        .paper-container {
            display: none; perspective: 1000px; cursor: pointer;
            z-index: 11;
        }

        .paper {
            width: 220px; height: 160px; background: #fff;
            position: relative; transform-style: preserve-3d;
            transition: transform 1s; border: 4px solid white;
            display: flex; justify-content: center; align-items: center;
        }

        .paper.open { transform: rotateX(180deg); }

        .photo-inside {
            width: 100%; height: 100%; object-fit: cover;
            transform: rotateX(180deg); 
        }

        /* Heart Collage */
        .heart-photo {
            position: absolute; width: 50px; height: 50px;
            border: 2px solid white; object-fit: cover;
            transition: all 1.5s ease-in-out; opacity: 0;
            z-index: 5; border-radius: 5px;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    
    <div class="content-wrapper">
        <button id="start-btn">Open Surprise</button>
        <div id="message-popup"></div>
        <h1 id="display-text" style="display: none;"></h1>

        <div class="paper-container" id="paper-container">
            <div class="paper" id="paper">
                <img src="photo_6176885797924048141_y.jpg" class="photo-inside">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const textElement = document.getElementById('display-text');
        const startBtn = document.getElementById('start-btn');
        const paperContainer = document.getElementById('paper-container');
        const paper = document.getElementById('paper');
        const messagePopup = document.getElementById('message-popup');

        // Matrix Settings
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f"; 
            ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                const text = Math.random() > 0.5 ? "0" : "1";
                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }

        // Sequence
        const sequence = ["3", "2", "1", "HAPPY", "BIRTHDAY", "TO", "JASMIN", "❤️"];
        const messages = ["Happy Birthday Love 💖", "Wish you the best, I LOVE YOU SO MUCH.", "Enjoy your day, my love!"];
        let seqIndex = 0;
        let msgIndex = 0;

        function updateText() {
            if (seqIndex < sequence.length) {
                textElement.textContent = sequence[seqIndex++];
                setTimeout(updateText, 1000); 
            } else {
                textElement.style.display = 'none';
                paperContainer.style.display = 'block';
                showNextMessage();
            }
        }

        function showNextMessage() {
            if (msgIndex < messages.length) {
                messagePopup.innerText = messages[msgIndex++];
                messagePopup.style.display = 'block';
            }
        }

        function createHeartCollage() {
            const count = 24; // Number of photos in the heart
            for (let i = 0; i < count; i++) {
                const img = document.createElement('img');
                img.src = `2.jpg`;
                img.className = 'heart-photo';
                // Random starting position
                img.style.left = Math.random() * window.innerWidth + 'px';
                img.style.top = Math.random() * window.innerHeight + 'px';
                document.body.appendChild(img);

                // Animate to heart shape
                setTimeout(() => {
                    const t = (i / count) * 2 * Math.PI;
                    // Heart formula
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    const scale = 12; // Size of the heart

                    img.style.left = (centerX + x * scale - 25) + 'px';
                    img.style.top = (centerY + y * scale - 25) + 'px';
                    img.style.opacity = '1';
                }, 100 * i);
            }
        }

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            textElement.style.display = 'block';
            setInterval(drawMatrix, 50);
            updateText();
        });

        paperContainer.addEventListener('click', () => {
            if (!paper.classList.contains('open')) {
                paper.classList.add('open');
                showNextMessage();
                setTimeout(createHeartCollage, 1000);
            }
        });
    </script>
</body>
</html>
